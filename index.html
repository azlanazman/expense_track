<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --ink: oklch(0.24 0.012 265);
      --ink-2: oklch(0.46 0.012 265);
      --ink-3: oklch(0.62 0.012 265);
      --line: oklch(0.91 0.006 265);
      --line-2: oklch(0.95 0.005 265);
      --surface: oklch(1 0 0);
      --screen-bg: oklch(0.994 0.002 95);
      --page-bg: oklch(0.965 0.004 95);
      --danger: oklch(0.55 0.16 25);

      --accent: oklch(0.84 0.18 86);
      --accent-strong: oklch(0.78 0.18 86);
      --accent-soft: oklch(0.97 0.06 86);
      --accent-line: oklch(0.91 0.10 86);
      --accent-ink: oklch(0.46 0.12 86);
      --accent-shadow: oklch(0.84 0.18 86 / 0.55);
      --on-accent: oklch(0.28 0.05 86);

      --comp:        oklch(0.22 0.01 265);
      --comp-soft:   oklch(0.94 0.01 265);
      --comp-line:   oklch(0.82 0.02 265);
      --comp-ink:    oklch(0.30 0.01 265);
      --comp-shadow: oklch(0.22 0.01 265 / 0.5);
      --on-comp:     oklch(0.99 0 0);

      --radius: 12px;
      --radius-sm: 7px;
      --radius-lg: 19px;

      --sp: 1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--screen-bg);
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "ss01" 1, "cv01" 1;
    }

    /* ── Amount hero card ── */
    .amount-card {
      background: var(--accent);
      color: var(--on-accent);
      border-radius: var(--radius-lg);
      padding: calc(var(--sp) * 22px) 24px;
      box-shadow: 0 12px 24px -12px var(--accent-shadow);
    }

    .amount-label {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.85;
    }

    .amount-input {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 6px;
    }

    .amount-input .rm {
      font-size: 24px;
      font-weight: 700;
      opacity: 0.85;
    }

    .amount-input input {
      background: none;
      border: none;
      outline: none;
      color: var(--on-accent);
      font: inherit;
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -0.03em;
      width: 100%;
      font-variant-numeric: tabular-nums;
    }

    .amount-input input::placeholder {
      color: var(--on-accent);
      opacity: 0.55;
    }

    /* ── Form fields ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
    }

    .input-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: calc(var(--sp) * 14px) 16px;
      font-size: 16px;
      font-weight: 500;
      color: var(--ink);
      width: 100%;
      cursor: pointer;
      transition: 0.15s;
      text-align: left;
    }

    .input-row.note {
      cursor: text;
    }

    .input-row.select:hover {
      border-color: var(--accent-line);
    }

    input.input-row {
      outline: none;
    }

    input.input-row::placeholder {
      color: var(--ink-3);
      font-weight: 500;
    }

    .muted-ic {
      color: var(--ink-3);
      display: inline-flex;
    }

    .sel-val {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .chev {
      transition: transform 0.2s;
    }

    .chev.open {
      transform: rotate(180deg);
      color: var(--accent);
    }

    /* ── In-flow dropdown ── */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 20;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 16px 40px -12px oklch(0.3 0.02 265 / 0.28);
      padding: 6px;
      max-height: 280px;
      overflow: auto;
    }

    .dd-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 11px 12px;
      border-radius: calc(var(--radius) * 0.7);
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      transition: 0.12s;
    }

    .dd-item:hover {
      background: var(--accent-soft);
    }

    .dd-item.on {
      color: var(--accent);
      font-weight: 700;
    }

    .dd-check {
      margin-left: auto;
      color: var(--accent);
      display: inline-flex;
    }

    /* ── Chips ── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink-2);
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 9px 15px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.14s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--accent-line);
    }

    .chip.on {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--on-accent);
    }

    .chip.soft {
      background: var(--accent-soft);
      border-color: var(--accent-line);
      color: var(--accent-ink);
    }

    .chip.soft.comp {
      background: var(--comp-soft);
      border-color: var(--comp-line);
      color: var(--comp-ink);
    }

    .chip.add {
      background: none;
      border-style: dashed;
      color: var(--ink-3);
    }

    .chip.add:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .chip-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      padding: 0 24px calc(var(--sp) * 16px);
    }

    /* ── Payment pill ── */
    .pay-pill {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: var(--comp-soft);
      color: var(--comp-ink);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .pay-pill.sm {
      font-size: 12px;
      padding: 4px 9px;
    }

    .pay-pill.xs {
      font-size: 10.5px;
      padding: 2px 7px;
    }

    /* ── Log list ── */
    .screen-body.list {
      gap: 0;
    }

    .log-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-bottom: 1px solid var(--line-2);
      padding: calc(var(--sp) * 15px) 2px;
      cursor: pointer;
      font: inherit;
      transition: 0.12s;
    }

    .log-row:hover {
      background: var(--accent-soft);
      border-radius: var(--radius-sm);
      padding-left: 12px;
      padding-right: 12px;
      border-bottom-color: transparent;
    }

    .log-dot {
      width: 13px;
      height: 13px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .log-main {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 0;
    }

    .log-cat {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    .log-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--ink-3);
      font-weight: 500;
    }

    .log-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .log-amt {
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .log-note {
      font-size: 12px;
      color: var(--ink-3);
      font-style: italic;
    }

    .list-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--ink-3);
      font-size: 12.5px;
      font-weight: 500;
      padding: 18px 0 4px;
    }

    /* ── Inline edit form ── */
    .log-edit {
      padding: calc(var(--sp) * 14px) 2px;
      border-bottom: 1px solid var(--line-2);
      display: flex;
      flex-direction: column;
      gap: calc(var(--sp) * 12px);
    }

    .log-edit-actions {
      display: flex;
      gap: 10px;
    }

    .btn-update {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--accent);
      color: var(--on-accent);
      border: none;
      border-radius: var(--radius);
      padding: 12px;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
    }

    .btn-update:hover {
      background: var(--accent-strong);
    }

    .btn-delete {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid oklch(0.8 0.08 25);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 12px 18px;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
    }

    .btn-delete:hover {
      background: oklch(0.985 0.012 25);
    }

    /* ── Report stat cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      border-radius: var(--radius-lg);
      padding: calc(var(--sp) * 18px) 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 96px;
      justify-content: space-between;
    }

    .stat-card.accent {
      background: var(--accent);
      color: var(--on-accent);
      box-shadow: 0 12px 24px -14px var(--accent-shadow);
    }

    .stat-card.comp {
      background: var(--comp);
      color: var(--on-comp);
      box-shadow: 0 12px 24px -14px var(--comp-shadow);
    }

    .stat-label {
      font-size: 12.5px;
      font-weight: 600;
      opacity: 0.85;
    }

    .stat-val {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.025em;
      font-variant-numeric: tabular-nums;
    }

    .block-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 4px;
      display: block;
    }

    /* ── Breakdown bars ── */
    .breakdown {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .bd-row {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .bd-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--ink);
    }

    .bd-bar {
      height: 8px;
      background: var(--line-2);
      border-radius: 999px;
      overflow: hidden;
    }

    .bd-fill {
      display: block;
      height: 100%;
      border-radius: 999px;
    }

    .bd-amt {
      font-size: 13.5px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--ink-2);
    }

    /* ── Report table ── */
    .grid-block {
      display: flex;
      flex-direction: column;
    }

    .grid-scroll {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      -webkit-overflow-scrolling: touch;
    }

    .report-table {
      border-collapse: collapse;
      width: 100%;
      font-variant-numeric: tabular-nums;
    }

    .report-table th,
    .report-table td {
      padding: 12px 14px;
      text-align: right;
      white-space: nowrap;
      font-size: 13.5px;
    }

    .report-table thead th {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink-3);
      text-transform: uppercase;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .report-table tbody td {
      font-weight: 600;
      color: var(--ink);
      border-bottom: 1px solid var(--line-2);
    }

    .report-table tbody td.zero {
      color: oklch(0.82 0.006 265);
      font-weight: 500;
    }

    .report-table .sticky-col {
      position: sticky;
      left: 0;
      text-align: left;
      background: var(--surface);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .report-table thead .sticky-col {
      z-index: 2;
    }

    .report-table .tot-col {
      font-weight: 800;
      color: var(--accent-ink);
      background: var(--accent-soft);
    }

    .report-table tfoot td {
      font-weight: 800;
      color: var(--ink);
      background: var(--accent-soft);
      border-top: 1.5px solid var(--accent-line);
    }

    .report-table tfoot .sticky-col {
      background: var(--accent-soft);
    }

    .report-table tfoot .tot-col {
      background: var(--accent);
      color: var(--on-accent);
    }

    /* ── Settings ── */
    .settings {
      gap: calc(var(--sp) * 26px);
    }

    .settings section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .row-card {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      font: inherit;
      transition: 0.14s;
    }

    .row-card+.row-card {
      margin-top: 10px;
    }

    .row-card:hover {
      border-color: var(--accent-line);
    }

    .rc-ic {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .rc-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .rc-title {
      font-size: 15.5px;
      font-weight: 700;
      color: var(--ink);
    }

    .rc-sub {
      font-size: 12.5px;
      color: var(--ink-3);
    }

    .row-card.danger {
      color: var(--danger);
    }

    .row-card.danger .rc-ic {
      background: oklch(0.95 0.03 25);
      color: var(--danger);
    }

    .row-card.danger .rc-title {
      color: var(--danger);
    }

    .row-card.danger:hover {
      border-color: oklch(0.8 0.08 25);
      background: oklch(0.985 0.012 25);
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      display: flex;
      align-items: stretch;
      justify-content: space-around;
      border-top: 1px solid var(--line);
      background: var(--surface);
      padding: 12px 8px calc(12px + var(--sp) * 6px);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex: 1;
      background: none;
      border: none;
      font: inherit;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--ink-3);
      cursor: pointer;
      transition: 0.14s;
      padding: 2px 0;
      min-height: 44px;
      justify-content: center;
    }

    .nav-item.on {
      color: var(--accent);
      font-weight: 700;
    }

    .nav-item:hover {
      color: var(--accent);
    }

    /* ── Screen scaffold ── */
    .screen {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
    }

    .hdr {
      padding: calc(var(--sp) * 14px) 24px calc(var(--sp) * 18px);
    }

    .hdr-eyebrow {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ink-3);
      margin-bottom: 5px;
    }

    .hdr h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.05;
    }

    .hdr-total {
      margin-top: 12px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .hdr-total span {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-3);
      letter-spacing: 0;
    }

    .screen-body {
      padding: 0 24px calc(var(--sp) * 22px);
      display: flex;
      flex-direction: column;
      gap: calc(var(--sp) * 18px);
      flex: 1;
    }

    /* ── Month nav ── */
    .report-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .month-title {
      text-align: center;
    }

    .month-title h1 {
      font-size: 24px;
    }

    .month-nav {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: 0.15s;
    }

    .month-nav:hover {
      background: var(--accent-soft);
      border-color: var(--accent-line);
      color: var(--accent);
    }

    /* ── Login screen ── */
    .login-screen {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 32px;
      background: var(--screen-bg);
    }

    .login-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.025em;
      text-align: center;
    }

    .login-sub {
      font-size: 14px;
      color: var(--ink-3);
      text-align: center;
    }

    .btn-google {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: var(--on-accent);
      border: none;
      border-radius: var(--radius-lg);
      padding: 16px 28px;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
      width: 100%;
      max-width: 320px;
      justify-content: center;
      box-shadow: 0 12px 24px -12px var(--accent-shadow);
    }

    .btn-google:hover {
      background: var(--accent-strong);
    }

    /* ── Save button ── */
    .btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--accent);
      color: var(--on-accent);
      border: none;
      border-radius: var(--radius-lg);
      padding: 16px;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
      width: 100%;
      box-shadow: 0 12px 24px -12px var(--accent-shadow);
    }

    .btn-save:hover {
      background: var(--accent-strong);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(70px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: oklch(0.99 0 0);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13.5px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
    }

    /* ── Period picker ── */
    .period-row { display: flex; flex-wrap: wrap; gap: 9px; padding: 0 24px 12px; }
    .custom-dates { display: flex; gap: 12px; padding: 0 24px 12px; }
    .custom-dates .field { flex: 1; }

    /* ── Mobile ── */
    @media (max-width: 460px) {
      body {
        padding: 0;
      }
    }
  </style>
</head>

        <button class="btn-save" id="btn-save-expense" type="button">

    <!-- Screen 2: Expense Log -->
    <div id="screen-log" class="screen" style="display:none">
      <div class="hdr">

    <!-- Screen 4: Settings -->
    <div id="screen-settings" class="screen" style="display:none">
      <div class="hdr">

      <div class="screen-body settings" id="settings-body">

        <section>
          <span class="block-label">Account</span>
          <button class="row-card" id="btn-account" type="button">
            <div class="rc-ic">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">

            <div class="rc-main">

            <svg class="muted-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

    <!-- Bottom navigation -->
    <nav class="bottom-nav" id="bottom-nav">

        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />

          stroke-linecap="round" stroke-linejoin="round">

          <line x1="12" y1="20" x2="12" y2="4" />

      <button class="nav-item" id="nav-settings" type="button">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        Settings
      </button>
    </nav>

  </div><!-- /#app -->

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js';
    import {
      getFirestore, collection, addDoc, query, where, orderBy,
      getDocs, doc, updateDoc, deleteDoc, setDoc, getDoc, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js';

    // PASTE FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "AIzaSyCZVMB-jFO3XnqC3fsm8Ue0qoqAGRYJ_7A",
      authDomain: "expense-track-5b2d3.firebaseapp.com",
      projectId: "expense-track-5b2d3",
      storageBucket: "expense-track-5b2d3.firebasestorage.app",
      messagingSenderId: "21700594656",
      appId: "1:21700594656:web:cdfd84a4e6d4d07273f985"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // ── Helpers ────────────────────────────────────────────────────────────────

    const fmt = (n) => n.toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmt0 = (n) => Math.round(n).toLocaleString('en-MY');

    function parseLocalDate(s) { return new Date(s + 'T00:00:00'); }
    function displayDate(s) {
      return parseLocalDate(s).toLocaleDateString('en-MY', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function todayString() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function monthLabel(year, month) {
      return new Date(year, month - 1, 1).toLocaleDateString('en-MY', { month: 'long', year: 'numeric' });
    }

    const CATEGORY_COLOURS = {
      family: 'oklch(0.62 0.20 150)',
      food: 'oklch(0.62 0.20 25)',
      toll: 'oklch(0.62 0.20 60)',
      parking: 'oklch(0.62 0.20 330)',
      fuel: 'oklch(0.62 0.20 250)',
      car: 'oklch(0.62 0.20 285)',
      subs: 'oklch(0.62 0.20 200)',
      medical: 'oklch(0.62 0.20 5)',
      misc: 'oklch(0.62 0.20 100)',
      _default: 'oklch(0.62 0.20 265)',
    };
    const FALLBACK_HUES = [40, 120, 220, 300, 170, 70, 10, 230];

    function catColor(name, allCats) {
      const key = name.toLowerCase();
      if (CATEGORY_COLOURS[key]) return CATEGORY_COLOURS[key];
      const idx = allCats.findIndex(c => c.toLowerCase() === key);
      return `oklch(0.62 0.20 ${FALLBACK_HUES[(idx < 0 ? 0 : idx) % 8]})`;
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── App state ───────────────────────────────────────────────────────────────

    let currentUser = null;
    let userSettings = { categories: [], paymentMethods: [] };
    let activeScreen = 'add';

    const DEFAULT_CATEGORIES = ['Family', 'Food', 'Toll', 'Parking', 'Fuel', 'Car', 'Subs', 'Medical', 'Misc'];
    const DEFAULT_PAYMENTS = ['TNG', 'CIMB', 'RHB', 'MLMT', 'SETEL', 'AEON', 'SPAY'];

    // ── Navigation ──────────────────────────────────────────────────────────────

    function showScreen(name) {
      activeScreen = name;
      ['add', 'log', 'report', 'settings'].forEach(s => {
        document.getElementById(`screen-${s}`).style.display = s === name ? '' : 'none';
      });
      ['add', 'log', 'report', 'settings'].forEach(s => {
        document.getElementById(`nav-${s}`).classList.toggle('on', s === name);
      });
    }

    document.getElementById('nav-add').addEventListener('click', () => showScreen('add'));
    document.getElementById('nav-log').addEventListener('click', () => { initLog(); showScreen('log'); });
    document.getElementById('nav-report').addEventListener('click', () => { initReport(); showScreen('report'); });
    document.getElementById('nav-settings').addEventListener('click', () => { renderSettings(); showScreen('settings'); });

    // ── Auth ────────────────────────────────────────────────────────────────────

    document.getElementById('btn-google-signin').addEventListener('click', async () => {
      try { await signInWithPopup(auth, provider); }
      catch (e) { console.error(e); alert('Sign-in failed: ' + e.message); }
    });

    document.getElementById('btn-signout').addEventListener('click', async () => {
      await signOut(auth);
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('app').style.display = '';
        await loadUserSettings();
        initAddScreen();
        showScreen('add');
      } else {
        currentUser = null;
        document.getElementById('screen-login').style.display = '';
        document.getElementById('app').style.display = 'none';
      }
    });

    // ── User settings ───────────────────────────────────────────────────────────

    async function loadUserSettings() {
      const ref = doc(db, 'userSettings', currentUser.uid);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        userSettings = snap.data();
      } else {
        userSettings = { categories: DEFAULT_CATEGORIES, paymentMethods: DEFAULT_PAYMENTS };
        await setDoc(ref, userSettings);
      }
    }

    async function saveUserSettings() {
      await setDoc(doc(db, 'userSettings', currentUser.uid), userSettings);
    }

    // ── Firestore query helper ──────────────────────────────────────────────────

    async function fetchMonth(year, month) {
      const y = String(year);
      const m = String(month).padStart(2, '0');
      const q = query(
        collection(db, 'expenses'),
        where('uid', '==', currentUser.uid),
        where('date', '>=', `${y}-${m}-01`),
        where('date', '<=', `${y}-${m}-31`),
        orderBy('date', 'desc')
      );
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // ── Screen 0 (Login) is handled by auth state above ─────────────────────────

    // ── Screen 1: Add Expense ───────────────────────────────────────────────────

    let addState = { date: todayString(), category: '', payment: '', catDdOpen: false, payDdOpen: false };

    function initAddScreen() {
      addState.date = todayString();
      addState.category = userSettings.categories[0] || '';
      addState.payment = userSettings.paymentMethods[0] || '';
      renderAddScreen();
    }

    function renderAddScreen() {
      const d = new Date();
      document.getElementById('add-eyebrow').textContent = d.toLocaleDateString('en-MY', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('add-date-display').textContent = displayDate(addState.date);
      document.getElementById('add-date-input').value = addState.date;

      const catDisplay = document.getElementById('add-cat-display');
      catDisplay.innerHTML = `<span class="chip-dot" style="background:${catColor(addState.category, userSettings.categories)}"></span>${addState.category}`;

      const payDisplay = document.getElementById('add-pay-display');
      payDisplay.innerHTML = `<span class="pay-pill sm">${addState.payment}</span>`;
    }

    // Date picker
    const addDateBtn = document.getElementById('add-date-btn');
    const addDateInput = document.getElementById('add-date-input');
    addDateBtn.addEventListener('click', () => addDateInput.showPicker ? addDateInput.showPicker() : addDateInput.click());
    addDateInput.addEventListener('change', () => {
      addState.date = addDateInput.value;
      document.getElementById('add-date-display').textContent = displayDate(addState.date);
    });

    // Category dropdown
    const addCatBtn = document.getElementById('add-cat-btn');
    const addCatDd = document.getElementById('add-cat-dd');
    const addCatChev = document.getElementById('add-cat-chev');

    function openCatDd() {
      closePayDd();
      addState.catDdOpen = true;
      addCatChev.classList.add('open');
      addCatDd.style.display = '';
      addCatDd.innerHTML = userSettings.categories.map(c => `
        <button class="dd-item${c === addState.category ? ' on' : ''}" data-cat="${c}" type="button">
          <span class="chip-dot" style="background:${catColor(c, userSettings.categories)}"></span>
          ${c}
          ${c === addState.category ? '<span class="dd-check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>' : ''}
        </button>`).join('');
      addCatDd.querySelectorAll('.dd-item').forEach(btn => {
        btn.addEventListener('click', () => {
          addState.category = btn.dataset.cat;
          closeCatDd();
          document.getElementById('add-cat-display').innerHTML = `<span class="chip-dot" style="background:${catColor(addState.category, userSettings.categories)}"></span>${addState.category}`;
        });
      });
    }
    function closeCatDd() {
      addState.catDdOpen = false;
      addCatChev.classList.remove('open');
      addCatDd.style.display = 'none';
    }
    addCatBtn.addEventListener('click', () => addState.catDdOpen ? closeCatDd() : openCatDd());

    // Payment dropdown
    const addPayBtn = document.getElementById('add-pay-btn');
    const addPayDd = document.getElementById('add-pay-dd');
    const addPayChev = document.getElementById('add-pay-chev');

    function openPayDd() {
      closeCatDd();
      addState.payDdOpen = true;
      addPayChev.classList.add('open');
      addPayDd.style.display = '';
      addPayDd.innerHTML = userSettings.paymentMethods.map(p => `
        <button class="dd-item${p === addState.payment ? ' on' : ''}" data-pay="${p}" type="button">
          <span class="pay-pill sm">${p}</span>
          ${p === addState.payment ? '<span class="dd-check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>' : ''}
        </button>`).join('');
      addPayDd.querySelectorAll('.dd-item').forEach(btn => {
        btn.addEventListener('click', () => {
          addState.payment = btn.dataset.pay;
          closePayDd();
          document.getElementById('add-pay-display').innerHTML = `<span class="pay-pill sm">${addState.payment}</span>`;
        });
      });
    }
    function closePayDd() {
      addState.payDdOpen = false;
      addPayChev.classList.remove('open');
      addPayDd.style.display = 'none';
    }
    addPayBtn.addEventListener('click', () => addState.payDdOpen ? closePayDd() : openPayDd());

    // Close dropdowns on outside click
    document.addEventListener('click', (e) => {
      if (!document.getElementById('add-cat-field').contains(e.target)) closeCatDd();
      if (!document.getElementById('add-pay-field').contains(e.target)) closePayDd();
    });

    // Amount input — strip non-numeric chars
    document.getElementById('add-amount').addEventListener('input', (e) => {
      const v = e.target.value.replace(/[^0-9.]/g, '');
      const parts = v.split('.');
      e.target.value = parts.length > 2 ? parts[0] + '.' + parts.slice(1).join('') : v;
    });

    // Save
    document.getElementById('btn-save-expense').addEventListener('click', async () => {
      const amtRaw = document.getElementById('add-amount').value.trim();
      const amount = parseFloat(amtRaw);
      if (!amtRaw || isNaN(amount) || amount <= 0) { showToast('Enter a valid amount'); return; }
      try {
        await addDoc(collection(db, 'expenses'), {
          uid: currentUser.uid,
          date: addState.date,
          amount,
          category: addState.category,
          paymentMethod: addState.payment,
          notes: document.getElementById('add-notes').value.trim(),
          createdAt: serverTimestamp(),
        });
        document.getElementById('add-amount').value = '';
        document.getElementById('add-notes').value = '';
        showToast('Saved!');
      } catch (e) { console.error(e); showToast('Error saving'); }
    });

    // ── Screen 2: Expense Log ───────────────────────────────────────────────────

    let logState = { year: new Date().getFullYear(), month: new Date().getMonth() + 1, filter: 'All', entries: [], openId: null };

    async function initLog() {
      logState.year = new Date().getFullYear();
      logState.month = new Date().getMonth() + 1;
      logState.filter = 'All';
      logState.openId = null;
      await loadLog();
    }

    async function loadLog() {
      logState.entries = await fetchMonth(logState.year, logState.month);
      renderLog();
    }

    function renderLog() {
      const { entries, filter, year, month } = logState;
      document.getElementById('log-eyebrow').textContent = monthLabel(year, month);
      document.getElementById('log-month-title').textContent = monthLabel(year, month);

      const filtered = filter === 'All' ? entries : entries.filter(e => e.paymentMethod === filter);
      const total = filtered.reduce((s, e) => s + e.amount, 0);
      document.getElementById('log-total').innerHTML = `RM ${fmt(total)} <span>· ${filtered.length} entr${filtered.length === 1 ? 'y' : 'ies'}</span>`;

      // Filter chips
      const methods = ['All', ...new Set(entries.map(e => e.paymentMethod))];
      const shown = methods.slice(0, 4);
      const hidden = methods.slice(4);
      const filterRow = document.getElementById('log-filter-row');
      filterRow.innerHTML = shown.map(m => `<button class="chip${m === filter ? ' on' : ''}" data-method="${m}" type="button">${m}</button>`).join('') +
        (hidden.length ? `<button class="chip add" id="log-more-chip" type="button">+${hidden.length}</button>` : '');

      filterRow.querySelectorAll('.chip:not(.add)').forEach(btn => {
        btn.addEventListener('click', () => { logState.filter = btn.dataset.method; renderLog(); });
      });
      const moreChip = document.getElementById('log-more-chip');
      if (moreChip) {
        moreChip.addEventListener('click', () => {
          filterRow.innerHTML = methods.map(m => `<button class="chip${m === filter ? ' on' : ''}" data-method="${m}" type="button">${m}</button>`).join('');
          filterRow.querySelectorAll('.chip').forEach(btn => {
            btn.addEventListener('click', () => { logState.filter = btn.dataset.method; renderLog(); });
          });
        });
      }

      // List
      const list = document.getElementById('log-list');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="list-hint">No expenses this month</div>';
        return;
      }
      list.innerHTML = '';
      filtered.forEach(entry => {
        if (entry.id === logState.openId) {
          list.appendChild(buildEditForm(entry));
        } else {
          list.appendChild(buildLogRow(entry));
        }
      });
      list.insertAdjacentHTML('beforeend', '<div class="list-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>tap a row to edit or delete</div>');
    }

    function buildLogRow(entry) {
      const btn = document.createElement('button');
      btn.className = 'log-row';
      btn.innerHTML = `
        <span class="log-dot" style="background:${catColor(entry.category, userSettings.categories)}"></span>
        <div class="log-main">
          <div class="log-cat">${entry.category}</div>
          <div class="log-meta">${displayDate(entry.date)} <span class="pay-pill xs">${entry.paymentMethod}</span></div>
        </div>
        <div class="log-right">
          <div class="log-amt">RM ${fmt(entry.amount)}</div>
          ${entry.notes ? `<div class="log-note">${entry.notes}</div>` : ''}
        </div>`;
      btn.addEventListener('click', () => {
        logState.openId = entry.id;
        renderLog();
      });
      return btn;
    }

    function buildEditForm(entry) {
      const wrap = document.createElement('div');
      wrap.className = 'log-edit';
      wrap.innerHTML = `
        <div class="field">
          <label class="field-label">Amount</label>
          <input class="input-row note" type="text" inputmode="decimal" id="edit-amount-${entry.id}" value="${entry.amount}" autocomplete="off" />
        </div>
        <div class="field">
          <label class="field-label">Date</label>
          <button class="input-row select" id="edit-date-btn-${entry.id}" type="button">
            <span id="edit-date-disp-${entry.id}">${displayDate(entry.date)}</span>
            <span class="muted-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          </button>
          <input type="date" id="edit-date-input-${entry.id}" value="${entry.date}" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0" />
        </div>
        <div class="field" id="edit-cat-field-${entry.id}">
          <label class="field-label">Category</label>
          <button class="input-row select" id="edit-cat-btn-${entry.id}" type="button">
            <span class="sel-val" id="edit-cat-disp-${entry.id}">
              <span class="chip-dot" style="background:${catColor(entry.category, userSettings.categories)}"></span>${entry.category}
            </span>
            <span class="muted-ic"><svg class="chev" id="edit-cat-chev-${entry.id}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
          </button>
          <div class="dropdown" id="edit-cat-dd-${entry.id}" style="display:none"></div>
        </div>
        <div class="field" id="edit-pay-field-${entry.id}">
          <label class="field-label">Payment method</label>
          <button class="input-row select" id="edit-pay-btn-${entry.id}" type="button">
            <span class="sel-val" id="edit-pay-disp-${entry.id}"><span class="pay-pill sm">${entry.paymentMethod}</span></span>
            <span class="muted-ic"><svg class="chev" id="edit-pay-chev-${entry.id}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
          </button>
          <div class="dropdown" id="edit-pay-dd-${entry.id}" style="display:none"></div>
        </div>
        <div class="field">
          <label class="field-label">Notes</label>
          <input class="input-row note" type="text" id="edit-notes-${entry.id}" value="${entry.notes || ''}" placeholder="optional…" autocomplete="off" />
        </div>
        <div class="log-edit-actions">
          <button class="btn-update" id="edit-save-${entry.id}" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Update
          </button>
          <button class="btn-delete" id="edit-del-${entry.id}" type="button">Delete</button>
        </div>`;

      // wire up edit form state
      let editDate = entry.date, editCat = entry.category, editPay = entry.paymentMethod;
      let editCatOpen = false, editPayOpen = false;

      // amount input
      wrap.querySelector(`#edit-amount-${entry.id}`).addEventListener('input', (e) => {
        const v = e.target.value.replace(/[^0-9.]/g, '');
        const parts = v.split('.');
        e.target.value = parts.length > 2 ? parts[0] + '.' + parts.slice(1).join('') : v;
      });

      // date
      const datBtn = wrap.querySelector(`#edit-date-btn-${entry.id}`);
      const datInp = wrap.querySelector(`#edit-date-input-${entry.id}`);
      datBtn.addEventListener('click', () => datInp.showPicker ? datInp.showPicker() : datInp.click());
      datInp.addEventListener('change', () => {
        editDate = datInp.value;
        wrap.querySelector(`#edit-date-disp-${entry.id}`).textContent = displayDate(editDate);
      });

      // category dd
      const catBtn = wrap.querySelector(`#edit-cat-btn-${entry.id}`);
      const catDd = wrap.querySelector(`#edit-cat-dd-${entry.id}`);
      const catChev = wrap.querySelector(`#edit-cat-chev-${entry.id}`);
      function openEditCatDd() {
        closeEditPayDd();
        editCatOpen = true; catChev.classList.add('open'); catDd.style.display = '';
        catDd.innerHTML = userSettings.categories.map(c => `
          <button class="dd-item${c === editCat ? ' on' : ''}" data-cat="${c}" type="button">
            <span class="chip-dot" style="background:${catColor(c, userSettings.categories)}"></span>${c}
            ${c === editCat ? '<span class="dd-check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>' : ''}
          </button>`).join('');
        catDd.querySelectorAll('.dd-item').forEach(b => b.addEventListener('click', () => {
          editCat = b.dataset.cat;
          wrap.querySelector(`#edit-cat-disp-${entry.id}`).innerHTML = `<span class="chip-dot" style="background:${catColor(editCat, userSettings.categories)}"></span>${editCat}`;
          closeEditCatDd();
        }));
      }
      function closeEditCatDd() { editCatOpen = false; catChev.classList.remove('open'); catDd.style.display = 'none'; }
      catBtn.addEventListener('click', () => editCatOpen ? closeEditCatDd() : openEditCatDd());

      // payment dd
      const payBtn = wrap.querySelector(`#edit-pay-btn-${entry.id}`);
      const payDd = wrap.querySelector(`#edit-pay-dd-${entry.id}`);
      const payChev = wrap.querySelector(`#edit-pay-chev-${entry.id}`);
      function openEditPayDd() {
        closeEditCatDd();
        editPayOpen = true; payChev.classList.add('open'); payDd.style.display = '';
        payDd.innerHTML = userSettings.paymentMethods.map(p => `
          <button class="dd-item${p === editPay ? ' on' : ''}" data-pay="${p}" type="button">
            <span class="pay-pill sm">${p}</span>
            ${p === editPay ? '<span class="dd-check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>' : ''}
          </button>`).join('');
        payDd.querySelectorAll('.dd-item').forEach(b => b.addEventListener('click', () => {
          editPay = b.dataset.pay;
          wrap.querySelector(`#edit-pay-disp-${entry.id}`).innerHTML = `<span class="pay-pill sm">${editPay}</span>`;
          closeEditPayDd();
        }));
      }
      function closeEditPayDd() { editPayOpen = false; payChev.classList.remove('open'); payDd.style.display = 'none'; }
      payBtn.addEventListener('click', () => editPayOpen ? closeEditPayDd() : openEditPayDd());

      // update
      wrap.querySelector(`#edit-save-${entry.id}`).addEventListener('click', async () => {
        const amtRaw = wrap.querySelector(`#edit-amount-${entry.id}`).value.trim();
        const amount = parseFloat(amtRaw);
        if (!amtRaw || isNaN(amount) || amount <= 0) { showToast('Enter a valid amount'); return; }
        const notes = wrap.querySelector(`#edit-notes-${entry.id}`).value.trim();
        try {
          await updateDoc(doc(db, 'expenses', entry.id), { amount, date: editDate, category: editCat, paymentMethod: editPay, notes });
          logState.openId = null;
          await loadLog();
          showToast('Updated!');
        } catch (e) { console.error(e); showToast('Error updating'); }
      });

      // delete
      wrap.querySelector(`#edit-del-${entry.id}`).addEventListener('click', async () => {
        if (!confirm('Delete this expense?')) return;
        try {
          await deleteDoc(doc(db, 'expenses', entry.id));
          logState.openId = null;
          await loadLog();
          showToast('Deleted');
        } catch (e) { console.error(e); showToast('Error deleting'); }
      });

      return wrap;
    }

    // Month nav for log
    document.getElementById('log-prev-month').addEventListener('click', async () => {
      logState.month--;
      if (logState.month < 1) { logState.month = 12; logState.year--; }
      logState.filter = 'All'; logState.openId = null;
      await loadLog();
    });
    document.getElementById('log-next-month').addEventListener('click', async () => {
      logState.month++;
      if (logState.month > 12) { logState.month = 1; logState.year++; }
      logState.filter = 'All'; logState.openId = null;
      await loadLog();
    });

    // ── Screen 3: Monthly Report ────────────────────────────────────────────────

    // ── Report helpers ──────────────────────────────────────────────────────────

    function getPeriodDates(period) {
      const t = new Date();
      const y = t.getFullYear(), m = t.getMonth(); // m = 0-indexed
      switch (period) {
        case 'month':
          return {
            start: `${y}-${String(m + 1).padStart(2, '0')}-01`,
            end: todayString()
          };
        case 'salary': {
          const pm = m === 0 ? 12 : m;
          const py = m === 0 ? y - 1 : y;
          return {
            start: `${py}-${String(pm).padStart(2, '0')}-28`,
            end: `${y}-${String(m + 1).padStart(2, '0')}-27`
          };
        }
        case '3m': {
          const d = new Date(y, m - 2, 1);
          return { start: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`, end: todayString() };
        }
        case '6m': {
          const d = new Date(y, m - 5, 1);
          return { start: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`, end: todayString() };
        }
        default:
          return { start: todayString(), end: todayString() };
      }
    }

    function daysBetween(startStr, endStr) {
      return Math.round((parseLocalDate(endStr) - parseLocalDate(startStr)) / 86400000) + 1;
    }

    function shortDate(s) {
      return parseLocalDate(s).toLocaleDateString('en-MY', { day: 'numeric', month: 'short', year: '2-digit' });
    }

    async function fetchDateRange(startDate, endDate) {
      const q = query(
        collection(db, 'expenses'),
        where('uid', '==', currentUser.uid),
        where('date', '>=', startDate),
        where('date', '<=', endDate),
        orderBy('date', 'desc')
      );
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // ── Report state ────────────────────────────────────────────────────────────

    let rptState = {
      period: 'month',
      startDate: '',
      endDate: '',
      selected: [],
      entries: [],
    };

    async function initReport() {
      rptState.period   = 'month';
      rptState.selected = [];
      const { start, end } = getPeriodDates('month');
      rptState.startDate = start;
      rptState.endDate   = end;
      await loadReport();
    }

    async function loadReport() {
      rptState.entries = await fetchDateRange(rptState.startDate, rptState.endDate);
      renderReport();
    }

    function renderReport() {
      const { entries, selected, startDate, endDate, period } = rptState;

      // Header title
      const titleEl = document.getElementById('rpt-range-title');
      if (period === 'month') {
        titleEl.textContent = monthLabel(new Date(startDate + 'T00:00:00').getFullYear(), new Date(startDate + 'T00:00:00').getMonth() + 1);
      } else if (period === 'salary') {
        titleEl.textContent = `Salary period`;
      } else {
        titleEl.textContent = `${shortDate(startDate)} – ${shortDate(endDate)}`;
      }

      // Period chips
      const periodRow = document.getElementById('rpt-period-row');
      const periods = [
        { key: 'month',  label: 'This Month' },
        { key: 'salary', label: 'Salary' },
        { key: '3m',     label: '3 Months' },
        { key: '6m',     label: '6 Months' },
        { key: 'custom', label: 'Custom' },
      ];
      periodRow.innerHTML = periods.map(p =>
        `<button class="chip${p.key === period ? ' on' : ''}" data-period="${p.key}" type="button">${p.label}</button>`
      ).join('');
      periodRow.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', async () => {
          const p = btn.dataset.period;
          rptState.period = p;
          if (p === 'custom') {
            document.getElementById('rpt-custom-dates').style.display = '';
            document.getElementById('rpt-from-date').value = rptState.startDate;
            document.getElementById('rpt-to-date').value   = rptState.endDate;
            renderReport();
          } else {
            document.getElementById('rpt-custom-dates').style.display = 'none';
            const { start, end } = getPeriodDates(p);
            rptState.startDate = start;
            rptState.endDate   = end;
            rptState.selected  = [];
            await loadReport();
          }
        });
      });

      // Custom date inputs
      const customWrap = document.getElementById('rpt-custom-dates');
      if (period === 'custom') {
        customWrap.style.display = '';
        const fromInp = document.getElementById('rpt-from-date');
        const toInp   = document.getElementById('rpt-to-date');
        fromInp.onchange = toInp.onchange = async () => {
          if (fromInp.value && toInp.value && fromInp.value <= toInp.value) {
            rptState.startDate = fromInp.value;
            rptState.endDate   = toInp.value;
            rptState.selected  = [];
            await loadReport();
          }
        };
      } else {
        customWrap.style.display = 'none';
      }

      const allMethods = [...new Set(entries.map(e => e.paymentMethod))];
      const isAll = selected.length === 0;
      const activeMethods = isAll ? allMethods : selected.filter(s => allMethods.includes(s));
      const filteredEntries = isAll ? entries : entries.filter(e => activeMethods.includes(e.paymentMethod));

      // Payment filter chips
      const filterRow = document.getElementById('rpt-filter-row');
      filterRow.innerHTML = `<button class="chip${isAll ? ' on' : ''}" data-method="__all__" type="button">All</button>` +
        allMethods.map(m => `<button class="chip${selected.includes(m) ? ' on' : ''}" data-method="${m}" type="button">${m}</button>`).join('');
      filterRow.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.dataset.method === '__all__') {
            rptState.selected = [];
          } else {
            const m = btn.dataset.method;
            rptState.selected = selected.includes(m)
              ? selected.filter(x => x !== m)
              : [...selected, m];
          }
          renderReport();
        });
      });

      // Stat cards — total + daily average
      const total    = filteredEntries.reduce((s, e) => s + e.amount, 0);
      const days     = daysBetween(startDate, endDate);
      const dailyAvg = days > 0 ? total / days : 0;
      document.getElementById('rpt-stats').innerHTML = `
        <div class="stat-card accent">
          <div class="stat-label">Total spent</div>
          <div class="stat-val">RM ${fmt(total)}</div>
        </div>
        <div class="stat-card comp">
          <div class="stat-label">Daily average</div>
          <div class="stat-val" style="font-size:22px">RM ${fmt(dailyAvg)}</div>
        </div>`;

      // Top categories
      const catTotals = {};
      filteredEntries.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });
      const topCats = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 4);
      const maxCat  = topCats[0]?.[1] || 1;
      document.getElementById('rpt-breakdown').innerHTML = topCats.map(([cat, amt]) => `
        <div class="bd-row">
          <div class="bd-name"><span class="chip-dot" style="background:${catColor(cat, userSettings.categories)}"></span>${cat}</div>
          <div class="bd-bar"><span class="bd-fill" style="width:${(amt / maxCat * 100).toFixed(1)}%;background:${catColor(cat, userSettings.categories)}"></span></div>
          <div class="bd-amt">RM ${fmt(amt)}</div>
        </div>`).join('');

      // Table — columns = months if range > 35 days, else payment methods
      const allCats  = [...new Set(entries.map(e => e.category))].sort();
      const table    = document.getElementById('rpt-table');
      const multiMonth = days > 35;

      if (multiMonth) {
        const months = [...new Set(entries.map(e => e.date.slice(0, 7)))].sort();
        const colLabel = ym => {
          const [y, m] = ym.split('-');
          return new Date(+y, +m - 1, 1).toLocaleDateString('en-MY', { month: 'short', year: '2-digit' });
        };
        const headCols   = months.map(ym => `<th>${colLabel(ym)}</th>`).join('');
        const footTotals = months.map(ym => {
          const s = filteredEntries.filter(e => e.date.startsWith(ym)).reduce((sum, e) => sum + e.amount, 0);
          return `<td>${s > 0 ? 'RM ' + fmt(s) : '—'}</td>`;
        }).join('');
        const grandTotal = filteredEntries.reduce((s, e) => s + e.amount, 0);
        const rows = allCats.map(cat => {
          const cells = months.map(ym => {
            const s = filteredEntries.filter(e => e.category === cat && e.date.startsWith(ym)).reduce((sum, e) => sum + e.amount, 0);
            return s > 0 ? `<td>RM ${fmt(s)}</td>` : `<td class="zero">—</td>`;
          }).join('');
          const rowTotal = filteredEntries.filter(e => e.category === cat).reduce((s, e) => s + e.amount, 0);
          return `<tr>
            <td class="sticky-col"><span class="chip-dot" style="background:${catColor(cat, userSettings.categories)}"></span>${cat}</td>
            ${cells}
            <td class="tot-col">RM ${fmt(rowTotal)}</td>
          </tr>`;
        }).join('');
        table.innerHTML = `
          <thead><tr><th class="sticky-col">Category</th>${headCols}<th class="tot-col">Total</th></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr><td class="sticky-col">Total</td>${footTotals}<td class="tot-col">RM ${fmt(grandTotal)}</td></tr></tfoot>`;
      } else {
        const colMethods = isAll ? allMethods : activeMethods;
        const headCols   = colMethods.map(m => `<th>${m}</th>`).join('');
        const footTotals = colMethods.map(m => {
          const s = filteredEntries.filter(e => e.paymentMethod === m).reduce((sum, e) => sum + e.amount, 0);
          return `<td>${s > 0 ? 'RM ' + fmt(s) : '—'}</td>`;
        }).join('');
        const grandTotal = filteredEntries.reduce((s, e) => s + e.amount, 0);
        const rows = allCats.map(cat => {
          const cells = colMethods.map(m => {
            const s = filteredEntries.filter(e => e.category === cat && e.paymentMethod === m).reduce((sum, e) => sum + e.amount, 0);
            return s > 0 ? `<td>RM ${fmt(s)}</td>` : `<td class="zero">—</td>`;
          }).join('');
          const rowTotal = filteredEntries.filter(e => e.category === cat).reduce((s, e) => s + e.amount, 0);
          return `<tr>
            <td class="sticky-col"><span class="chip-dot" style="background:${catColor(cat, userSettings.categories)}"></span>${cat}</td>
            ${cells}
            <td class="tot-col">RM ${fmt(rowTotal)}</td>
          </tr>`;
        }).join('');
        table.innerHTML = `
          <thead><tr><th class="sticky-col">Category</th>${headCols}<th class="tot-col">Total</th></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr><td class="sticky-col">Total</td>${footTotals}<td class="tot-col">RM ${fmt(grandTotal)}</td></tr></tfoot>`;
      }
    }

    // ── Screen 4: Settings ──────────────────────────────────────────────────────

    function renderSettings() {
      document.getElementById('settings-eyebrow').textContent = currentUser?.email || '';
      document.getElementById('account-email').textContent = currentUser?.email || '';
      renderCatChips();
      renderPayChips();
    }

    function renderCatChips() {
      const wrap = document.getElementById('cat-chips');
      wrap.innerHTML = '';
      userSettings.categories.forEach((cat, idx) => {
        wrap.appendChild(makeCatChip(cat, idx));
      });
      // Add chip
      const addBtn = document.createElement('button');
      addBtn.className = 'chip add';
      addBtn.type = 'button';
      addBtn.textContent = '+ Add';
      addBtn.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.placeholder = 'New category';
        inp.style.cssText = 'border:1px solid var(--accent-line);border-radius:999px;padding:9px 15px;font:inherit;font-size:14px;font-weight:600;color:var(--ink);outline:none;min-width:120px;';
        wrap.replaceChild(inp, addBtn);
        inp.focus();
        async function saveNew() {
          const val = inp.value.trim();
          if (val) {
            userSettings.categories = [...userSettings.categories, val];
            await saveUserSettings();
          }
          renderCatChips();
        }
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveNew(); if (e.key === 'Escape') renderCatChips(); });
        inp.addEventListener('blur', saveNew);
      });
      wrap.appendChild(addBtn);
    }

    function makeCatChip(cat, idx) {
      const chip = document.createElement('span');
      chip.className = 'chip soft';
      chip.style.position = 'relative';
      chip.innerHTML = `<span class="chip-dot" style="background:${catColor(cat, userSettings.categories)}"></span><span class="cat-label" style="cursor:pointer">${cat}</span><button type="button" class="chip-x" style="background:none;border:none;cursor:pointer;color:var(--ink-3);padding:0 0 0 6px;font-size:14px;line-height:1;display:inline-flex;align-items:center;" title="Remove">✕</button>`;
      // rename on label click
      chip.querySelector('.cat-label').addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.value = cat;
        inp.style.cssText = 'border:none;outline:none;background:none;font:inherit;font-size:14px;font-weight:600;color:var(--accent-ink);width:80px;';
        chip.querySelector('.cat-label').replaceWith(inp);
        inp.focus(); inp.select();
        async function saveRename() {
          const val = inp.value.trim();
          if (val && val !== cat) {
            userSettings.categories[idx] = val;
            await saveUserSettings();
          }
          renderCatChips();
        }
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveRename(); if (e.key === 'Escape') renderCatChips(); });
        inp.addEventListener('blur', saveRename);
      });
      // delete
      chip.querySelector('.chip-x').addEventListener('click', async () => {
        if (!confirm(`Remove "${cat}"?`)) return;
        userSettings.categories = userSettings.categories.filter((_, i) => i !== idx);
        await saveUserSettings();
        renderCatChips();
      });
      return chip;
    }

    function renderPayChips() {
      const wrap = document.getElementById('pay-chips');
      wrap.innerHTML = '';
      userSettings.paymentMethods.forEach((pay, idx) => {
        wrap.appendChild(makePayChip(pay, idx));
      });
      const addBtn = document.createElement('button');
      addBtn.className = 'chip add';
      addBtn.type = 'button';
      addBtn.textContent = '+ Add';
      addBtn.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.placeholder = 'New method';
        inp.style.cssText = 'border:1px solid var(--comp-line);border-radius:999px;padding:9px 15px;font:inherit;font-size:14px;font-weight:600;color:var(--ink);outline:none;min-width:120px;';
        wrap.replaceChild(inp, addBtn);
        inp.focus();
        async function saveNew() {
          const val = inp.value.trim();
          if (val) {
            userSettings.paymentMethods = [...userSettings.paymentMethods, val];
            await saveUserSettings();
          }
          renderPayChips();
        }
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveNew(); if (e.key === 'Escape') renderPayChips(); });
        inp.addEventListener('blur', saveNew);
      });
      wrap.appendChild(addBtn);
    }

    function makePayChip(pay, idx) {
      const chip = document.createElement('span');
      chip.className = 'chip soft comp';
      chip.innerHTML = `<span class="pay-label" style="cursor:pointer">${pay}</span><button type="button" class="chip-x" style="background:none;border:none;cursor:pointer;color:var(--comp-ink);padding:0 0 0 6px;font-size:14px;line-height:1;display:inline-flex;align-items:center;" title="Remove">✕</button>`;
      chip.querySelector('.pay-label').addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.value = pay;
        inp.style.cssText = 'border:none;outline:none;background:none;font:inherit;font-size:14px;font-weight:600;color:var(--comp-ink);width:70px;';
        chip.querySelector('.pay-label').replaceWith(inp);
        inp.focus(); inp.select();
        async function saveRename() {
          const val = inp.value.trim();
          if (val && val !== pay) {
            userSettings.paymentMethods[idx] = val;
            await saveUserSettings();
          }
          renderPayChips();
        }
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveRename(); if (e.key === 'Escape') renderPayChips(); });
        inp.addEventListener('blur', saveRename);
      });
      chip.querySelector('.chip-x').addEventListener('click', async () => {
        if (!confirm(`Remove "${pay}"?`)) return;
        userSettings.paymentMethods = userSettings.paymentMethods.filter((_, i) => i !== idx);
        await saveUserSettings();
        renderPayChips();
      });
      return chip;
    }

  </script>
